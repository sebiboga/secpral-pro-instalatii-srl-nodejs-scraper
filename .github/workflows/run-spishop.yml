name: Scrape Spishop Secpral Jobs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  scrape:
    runs-on: [self-hosted, pi400]
    env:
      SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: npm run scrape

      - name: Upload jobs output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spishop-jobs-output-${{ github.run_id }}
          path: jobs.json
          retention-days: 7

      - name: Upload company output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spishop-company-output-${{ github.run_id }}
          path: company.json
          retention-days: 7
