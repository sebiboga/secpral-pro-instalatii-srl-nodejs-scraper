name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  ensure-company-core:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ensure SECPRAL exists in company core
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
        run: |
          EXISTING=$(curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=id:10166281&rows=1" | jq '.response.numFound')
          
          echo "SECPRAL count in company core: $EXISTING"
          
          if [ "$EXISTING" -eq "0" ]; then
            echo "SECPRAL not found - adding to company core..."
            curl -s --user "${SOLR_AUTH}" \
              "https://solr.peviitor.ro/solr/company/update/json?commit=true" \
              -X POST \
              -H "Content-Type: application/json" \
              -d '[{"id":"10166281","company":"SECPRAL PRO INSTALATII SRL","brand":"spishop","status":"activ","location":["Cluj","Cluj-Napoca"],"website":["https://spishop.ro","https://secpral.ro"],"career":["https://spishop.ro/ro/content/12-cariere"],"lastScraped":"2026-04-17","scraperFile":"https://github.com/sebiboga/secpral-pro-instalatii-srl-nodejs-scraper/blob/main/.github/workflows/run-spishop.yml"}]'
          else
            echo "SECPRAL already exists in company core"
          fi
          
          FINAL=$(curl -s --user "${SOLR_AUTH}" \
            "https://solr.peviitor.ro/solr/company/select?q=id:10166281&rows=1" | jq '.response.numFound')
          
          echo "SECPRAL count after check: $FINAL"

  unit-tests:
    runs-on: ubuntu-latest
    needs: ensure-company-core
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          
      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: |
          npm run test:unit
          mv test-report.html test-results-unit.html
          
      - name: Upload Unit Test Results
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: test-results-unit.html
          retention-days: 30

  integration-tests:
    runs-on: ubuntu-latest
    needs: ensure-company-core
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          
      - name: Install dependencies
        run: npm install

      - name: Run Integration Tests
        run: |
          npm run test:integration
          mv test-report.html test-results-integration.html
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
          
      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-results
          path: test-results-integration.html
          retention-days: 30

  e2e-tests:
    runs-on: ubuntu-latest
    needs: ensure-company-core
    
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          
      - name: Install dependencies
        run: npm install

      - name: Run E2E Tests
        run: |
          npm run test:e2e
          mv test-report.html test-results-e2e.html
        env:
          SOLR_AUTH: ${{ secrets.SOLR_AUTH }}
          
      - name: Upload E2E Test Results
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: test-results-e2e.html
          retention-days: 30
